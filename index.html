<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>求职信息广场</title>
  <style>
    :root {
      --primary: #07C160;
      --primary-dark: #06ad56;
      --bg: #f5f6fa;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --muted: #888;
      --border: #e8eaed;
      --tag-bg: #e8f8ef;
      --tag-color: #07C160;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .header-stats {
      font-size: 13px;
      color: var(--muted);
    }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(135deg, #07C160 0%, #0ab368 100%);
      color: #fff;
      text-align: center;
      padding: 48px 24px 40px;
    }
    .hero h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }
    .hero p {
      font-size: 15px;
      opacity: 0.9;
      margin-bottom: 24px;
    }
    .search-bar {
      display: flex;
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      padding: 14px 18px;
      font-size: 15px;
      color: var(--text);
    }
    .search-bar button {
      background: var(--primary);
      border: none;
      color: #fff;
      padding: 14px 20px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }
    .search-bar button:hover { background: var(--primary-dark); }

    /* ===== MAIN LAYOUT ===== */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 16px;
    }

    /* ===== FILTER TAGS ===== */
    .filter-section {
      margin-bottom: 24px;
    }
    .filter-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 500;
    }
    .tag-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
      font-weight: 500;
    }
    .tag-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    .tag-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ===== SORT BAR ===== */
    .sort-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .result-count {
      font-size: 14px;
      color: var(--muted);
    }
    .result-count span { color: var(--primary); font-weight: 600; }
    .sort-select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
      background: #fff;
      color: var(--text);
    }

    /* ===== CARDS ===== */
    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .job-card {
      background: var(--card-bg);
      border-radius: 14px;
      padding: 20px 22px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .job-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.10);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      flex: 1;
    }
    .card-new-badge {
      background: #ff4757;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--muted);
    }
    .card-meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-content {
      font-size: 14px;
      color: #555;
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .card-tag {
      background: var(--tag-bg);
      color: var(--tag-color);
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 10px;
      font-weight: 500;
    }
    .card-time {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; }

    /* ===== LOADING ===== */
    .loading-container {
      text-align: center;
      padding: 60px 20px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 18px;
      padding: 28px 24px;
      max-width: 560px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--bg);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }
    .modal-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      padding-right: 40px;
    }
    .modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }
    .modal-meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--muted);
      background: var(--bg);
      padding: 5px 12px;
      border-radius: 8px;
    }
    .modal-body {
      font-size: 15px;
      line-height: 1.8;
      color: #444;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 32px 16px;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .hero h1 { font-size: 22px; }
      .modal { padding: 22px 18px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-inner">
    <a class="logo" href="/">
      <div class="logo-icon">💼</div>
      求职信息广场
    </a>
    <div class="header-stats" id="headerStats">加载中...</div>
  </div>
</header>

<!-- Hero -->
<div class="hero">
  <h1>找到你的下一份工作 🚀</h1>
  <p>来自真实群聊的最新求职信息，持续更新</p>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索职位、公司、技能..." />
    <button onclick="doSearch()">🔍</button>
  </div>
</div>

<!-- Main -->
<div class="container">

  <!-- Filters -->
  <div class="filter-section">
    <div class="filter-label">按标签筛选</div>
    <div class="tag-filters" id="tagFilters">
      <button class="tag-btn active" data-tag="all" onclick="filterByTag('all', this)">全部</button>
    </div>
  </div>

  <!-- Sort bar -->
  <div class="sort-bar">
    <div class="result-count">共 <span id="countDisplay">0</span> 条信息</div>
    <select class="sort-select" id="sortSelect" onchange="renderCards()">
      <option value="newest">最新发布</option>
      <option value="oldest">最早发布</option>
    </select>
  </div>

  <!-- Cards -->
  <div class="cards-grid" id="cardsGrid">
    <div class="loading-container">
      <div class="spinner"></div>
      <div style="color: var(--muted); font-size: 14px;">正在加载求职信息...</div>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-tags" id="modalTags"></div>
  </div>
</div>

<!-- Footer -->
<footer>
  <p>求职信息广场 · 信息来源于真实群聊 · 持续更新</p>
  <p style="margin-top: 6px;">如有问题请联系管理员</p>
</footer>

<script>
  // ============================================================
  // CONFIG
  // ============================================================
  const SUPABASE_URL = 'https://qebvxqxonoudtkjclyxv.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlYnZ4cXhvbm91ZHRramNseXh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTgwNjAsImV4cCI6MjA4OTU3NDA2MH0.HLAE_56UQBoWEmUghQKK_rTigExQvQwGWZ0dhzGXUM4';
  const TABLE_NAME = 'jobs';
  // ============================================================

  let allJobs = [];
  let currentTag = 'all';
  let searchQuery = '';

  // ---- Fetch data ----
  async function fetchJobs() {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/${TABLE_NAME}?select=*&order=created_at.desc`,
        {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          }
        }
      );
      if (!res.ok) throw new Error('Fetch failed');
      allJobs = await res.json();
      buildTagFilters();
      renderCards();
      updateHeaderStats();
    } catch (e) {
      document.getElementById('cardsGrid').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <h3>暂时无法加载数据</h3>
          <p>请检查 Supabase 配置，或稍后再试</p>
        </div>`;
    }
  }

  // ---- Build tag filter buttons ----
  function buildTagFilters() {
    const tagSet = new Set();
    allJobs.forEach(j => {
      if (j.tags) j.tags.forEach(t => tagSet.add(t));
    });
    const container = document.getElementById('tagFilters');
    container.innerHTML = `<button class="tag-btn active" data-tag="all" onclick="filterByTag('all', this)">全部</button>`;
    tagSet.forEach(tag => {
      const btn = document.createElement('button');
      btn.className = 'tag-btn';
      btn.dataset.tag = tag;
      btn.textContent = tag;
      btn.onclick = function() { filterByTag(tag, this); };
      container.appendChild(btn);
    });
  }

  // ---- Filter by tag ----
  function filterByTag(tag, btn) {
    currentTag = tag;
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards();
  }

  // ---- Search ----
  function doSearch() {
    searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
    renderCards();
  }
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
  });

  // ---- Render cards ----
  function renderCards() {
    let jobs = [...allJobs];

    // filter by tag
    if (currentTag !== 'all') {
      jobs = jobs.filter(j => j.tags && j.tags.includes(currentTag));
    }

    // filter by search
    if (searchQuery) {
      jobs = jobs.filter(j =>
        (j.title || '').toLowerCase().includes(searchQuery) ||
        (j.content || '').toLowerCase().includes(searchQuery) ||
        (j.company || '').toLowerCase().includes(searchQuery)
      );
    }

    // sort
    const sort = document.getElementById('sortSelect').value;
    if (sort === 'oldest') jobs.reverse();

    document.getElementById('countDisplay').textContent = jobs.length;

    const grid = document.getElementById('cardsGrid');
    if (jobs.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <h3>没有找到相关信息</h3>
          <p>试试换个关键词或清除筛选条件</p>
        </div>`;
      return;
    }

    grid.innerHTML = jobs.map((job, i) => {
      const isNew = isNewJob(job.created_at);
      const tagsHtml = job.tags ? job.tags.map(t =>
        `<span class="card-tag">${t}</span>`
      ).join('') : '';
      return `
        <div class="job-card" onclick="openModal(${allJobs.indexOf(job)})">
          <div class="card-header">
            <div class="card-title">${escHtml(job.title || '求职信息')}</div>
            ${isNew ? '<span class="card-new-badge">NEW</span>' : ''}
          </div>
          <div class="card-meta">
            ${job.company ? `<span class="card-meta-item">🏢 ${escHtml(job.company)}</span>` : ''}
            ${job.location ? `<span class="card-meta-item">📍 ${escHtml(job.location)}</span>` : ''}
            ${job.salary ? `<span class="card-meta-item">💰 ${escHtml(job.salary)}</span>` : ''}
          </div>
          <div class="card-content">${escHtml(job.content || '')}</div>
          <div class="card-footer">
            <div class="card-tags">${tagsHtml}</div>
            <div class="card-time">${formatTime(job.created_at)}</div>
          </div>
        </div>`;
    }).join('');
  }

  // ---- Modal ----
  function openModal(index) {
    const job = allJobs[index];
    document.getElementById('modalTitle').textContent = job.title || '求职信息';
    document.getElementById('modalMeta').innerHTML = [
      job.company ? `<span class="modal-meta-item">🏢 ${escHtml(job.company)}</span>` : '',
      job.location ? `<span class="modal-meta-item">📍 ${escHtml(job.location)}</span>` : '',
      job.salary ? `<span class="modal-meta-item">💰 ${escHtml(job.salary)}</span>` : '',
      `<span class="modal-meta-item">🕐 ${formatTime(job.created_at)}</span>`,
    ].join('');
    document.getElementById('modalBody').textContent = job.content || '';
    document.getElementById('modalTags').innerHTML = job.tags
      ? job.tags.map(t => `<span class="card-tag">${t}</span>`).join('')
      : '';
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modalOverlay') || !e.target) {
      document.getElementById('modalOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }
  }

  // ---- Header stats ----
  function updateHeaderStats() {
    const today = new Date().toDateString();
    const todayCount = allJobs.filter(j => new Date(j.created_at).toDateString() === today).length;
    document.getElementById('headerStats').textContent =
      `共 ${allJobs.length} 条 · 今日新增 ${todayCount} 条`;
  }

  // ---- Helpers ----
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function isNewJob(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    return diff < 24 * 60 * 60 * 1000; // 24小时内
  }

  function formatTime(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return '刚刚';
    if (diff < 3600) return `${Math.floor(diff/60)} 分钟前`;
    if (diff < 86400) return `${Math.floor(diff/3600)} 小时前`;
    if (diff < 86400 * 7) return `${Math.floor(diff/86400)} 天前`;
    return `${d.getMonth()+1}/${d.getDate()}`;
  }

  // ---- Auto refresh every 60 seconds ----
  fetchJobs();
  setInterval(fetchJobs, 60000);
</script>
</body>
</html>
