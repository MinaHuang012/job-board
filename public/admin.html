<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 — Mina's Cafeteria</title>
  <style>
    :root {
      --primary: #8B7355;
      --primary-dark: #6F4E37;
      --danger: #ff4757;
      --bg: #FAF8F5;
      --card-bg: #ffffff;
      --text: #3D3229;
      --muted: #8B8178;
      --border: #E8E2DB;
      --shadow: 0 2px 12px rgba(61,50,41,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== LOGIN SCREEN ===== */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      text-align: center;
    }
    .login-icon {
      width: 60px;
      height: 60px;
      background: var(--primary);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 20px;
    }
    .login-card h2 { font-size: 22px; margin-bottom: 6px; }
    .login-card p { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
    .login-input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      transition: border 0.2s;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 16px;
    }
    .login-input:focus { border-color: var(--primary); }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: var(--primary-dark); }
    .login-error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    /* ===== ADMIN SCREEN ===== */
    #adminScreen { display: none; }

    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    .header-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .header-title { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .logout-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--muted);
    }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    .container { max-width: 760px; margin: 0 auto; padding: 24px 16px; }

    /* ===== TABS ===== */
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .tab-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ===== FORM CARD ===== */
    .form-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .form-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
      font-family: inherit;
      color: var(--text);
      background: #fff;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--primary); }
    .form-textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 520px) { .form-row { grid-template-columns: 1fr; } .form-row-3 { grid-template-columns: 1fr; } }

    /* ===== TAG SELECTOR ===== */
    .tag-selector { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .tag-option {
      padding: 5px 12px;
      border-radius: 16px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      color: var(--muted);
    }
    .tag-option.selected { background: var(--primary); border-color: var(--primary); color: #fff; font-weight: 600; }
    .tag-option:hover:not(.selected) { border-color: var(--primary); color: var(--primary); }
    .tag-remove { margin-left: 4px; opacity: 0.6; font-size: 12px; }
    .tag-remove:hover { opacity: 1; color: var(--danger); }
    .custom-tag-row { display: flex; gap: 8px; margin-top: 10px; }
    .custom-tag-input {
      flex: 1;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      font-size: 12px;
      outline: none;
    }
    .custom-tag-input:focus { border-color: var(--primary); }
    .add-tag-btn {
      padding: 8px 14px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
    }
    .add-tag-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* ===== SUBMIT BUTTON ===== */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 12px;
    }
    .submit-btn:hover { background: var(--primary-dark); }
    .submit-btn:disabled { background: var(--border); cursor: not-allowed; color: var(--muted); }

    /* ===== PARSE PREVIEW ===== */
    .parse-preview { margin-top: 16px; }
    .parse-item {
      background: var(--bg);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .parse-item:hover { border-color: var(--primary); }
    .parse-item-title { font-weight: 600; margin-bottom: 6px; }
    .parse-item-meta { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .parse-item-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .mini-tag { background: #fff; color: var(--primary); font-size: 11px; padding: 2px 8px; border-radius: 8px; border: 1px solid var(--primary); }
    .parse-empty { text-align: center; padding: 20px; color: var(--muted); font-size: 14px; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #333;
      color: #fff;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.3s ease;
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--primary); }
    .toast.error { background: var(--danger); }

    /* ===== RECENT POSTS ===== */
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .refresh-btn {
      font-size: 13px;
      color: var(--primary);
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    .post-list { display: flex; flex-direction: column; gap: 10px; }
    .post-item {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .post-item-info { flex: 1; min-width: 0; }
    .post-item-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-item-meta { font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }
    .post-item-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .delete-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px; border-radius: 6px; flex-shrink: 0; }
    .delete-btn:hover { color: var(--danger); }
    .edit-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px; border-radius: 6px; flex-shrink: 0; }
    .edit-btn:hover { color: var(--primary); }

    /* ===== BATCH DELETE ===== */
    .batch-actions { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
    .select-all-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; cursor: pointer; background: #fff; }
    .select-all-btn:hover { border-color: var(--primary); color: var(--primary); }
    .batch-delete-btn { padding: 6px 12px; border: 1px solid var(--danger); border-radius: 8px; font-size: 12px; cursor: pointer; background: #fff; color: var(--danger); }
    .batch-delete-btn:hover { background: var(--danger); color: #fff; }
    .batch-delete-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .post-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); margin-right: 10px; margin-top: 2px; }
    .empty-list { text-align: center; padding: 32px; color: var(--muted); font-size: 14px; }

    /* ===== EDITABLE PARSE ITEM ===== */
    .edit-item { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1.5px solid var(--border); }
    .edit-item:hover { border-color: var(--primary); }
    .edit-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .edit-item-num { font-weight: 600; color: var(--primary); font-size: 14px; }
    .edit-item-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px; }
    .edit-item-remove:hover { color: var(--danger); }
    .edit-row { display: flex; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .edit-field { flex: 1; min-width: 140px; }
    .edit-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; display: block; }
    .edit-input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; }
    .edit-input:focus { border-color: var(--primary); }
    .edit-textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; min-height: 60px; resize: vertical; font-family: inherit; }
    .edit-textarea:focus { border-color: var(--primary); }
    .edit-tags-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 8px; }
    .edit-tag-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 14px; font-size: 12px; cursor: pointer; background: #fff; }
    .edit-tag-btn.selected { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* ===== LIST SEARCH ===== */
    .list-search { display: flex; gap: 10px; margin-bottom: 16px; }
    .list-search-input { flex: 1; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; }
    .list-search-input:focus { border-color: var(--primary); }

    /* ===== EDIT MODAL ===== */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-overlay.hidden { display: none; }
    .modal-content { background: #fff; border-radius: 16px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 24px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 18px; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--muted); }
    .modal-close:hover { color: var(--text); }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-save-btn { flex: 1; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 600; }
    .modal-save-btn:hover { background: var(--primary-dark); }
    .modal-cancel-btn { padding: 12px 20px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h2>管理员登录</h2>
    <p>请输入管理密码以发布求职信息</p>
    <input type="password" class="login-input" id="passwordInput" placeholder="输入密码" onkeydown="if(event.key==='Enter') doLogin()" />
    <button class="login-btn" onclick="doLogin()">登录</button>
    <div class="login-error" id="loginError">密码错误，请重试</div>
  </div>
</div>

<!-- Admin Screen -->
<div id="adminScreen">
  <header>
    <div class="header-inner">
      <div class="header-title">💼 管理后台</div>
      <button class="logout-btn" onclick="doLogout()">退出登录</button>
    </div>
  </header>

  <div class="container">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('single')" id="tabSingle">单条发布</button>
      <button class="tab-btn" onclick="switchTab('batch')" id="tabBatch">批量导入</button>
      <button class="tab-btn" onclick="switchTab('list')" id="tabList">信息列表</button>
    </div>

    <!-- Single Form -->
    <div id="singleTab">
      <div class="form-card">
        <h3>✏️ 发布新信息</h3>
        
        <!-- 规范化字段 -->
        <div class="form-row-3">
          <div class="form-group">
            <label class="form-label">【Base地】</label>
            <input class="form-input" id="jobBase" placeholder="如：北京、上海" />
          </div>
          <div class="form-group">
            <label class="form-label">【公司名称】</label>
            <input class="form-input" id="jobCompany" placeholder="如：腾讯、阿里" />
          </div>
          <div class="form-group">
            <label class="form-label">【岗位名称】</label>
            <input class="form-input" id="jobTitle" placeholder="如：前端工程师、实习生" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">【公司介绍】</label>
          <input class="form-input" id="jobCompanyIntro" placeholder="公司简要介绍" />
        </div>

        <div class="form-group">
          <label class="form-label">【岗位介绍/岗位职责】</label>
          <textarea class="form-textarea" id="jobDesc" placeholder="岗位具体工作内容..."></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">【岗位要求】</label>
          <textarea class="form-textarea" id="jobRequirement" placeholder="职位要求..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">【岗位收获/薪酬】</label>
            <input class="form-input" id="jobSalary" placeholder="如：300/天、8k/月" />
          </div>
          <div class="form-group">
            <label class="form-label">【简历投递方式/申请链接】</label>
            <input class="form-input" id="jobApply" placeholder="邮箱或申请链接" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">【其他备注】</label>
          <input class="form-input" id="jobRemark" placeholder="其他补充信息" />
        </div>

        <div class="form-group">
          <label class="form-label">选择标签（可多选，点击红X删除预设标签）</label>
          <div class="tag-selector" id="tagSelector">
            <span class="tag-option" data-tag="全职" onclick="toggleTag(this)">全职<span class="tag-remove" onclick="removePresetTag(this, '全职')">×</span></span>
            <span class="tag-option" data-tag="兼职" onclick="toggleTag(this)">兼职<span class="tag-remove" onclick="removePresetTag(this, '兼职')">×</span></span>
            <span class="tag-option" data-tag="实习" onclick="toggleTag(this)">实习<span class="tag-remove" onclick="removePresetTag(this, '实习')">×</span></span>
            <span class="tag-option" data-tag="远程" onclick="toggleTag(this)">远程<span class="tag-remove" onclick="removePresetTag(this, '远程')">×</span></span>
            <span class="tag-option" data-tag="技术" onclick="toggleTag(this)">技术<span class="tag-remove" onclick="removePresetTag(this, '技术')">×</span></span>
            <span class="tag-option" data-tag="设计" onclick="toggleTag(this)">设计<span class="tag-remove" onclick="removePresetTag(this, '设计')">×</span></span>
            <span class="tag-option" data-tag="产品" onclick="toggleTag(this)">产品<span class="tag-remove" onclick="removePresetTag(this, '产品')">×</span></span>
            <span class="tag-option" data-tag="运营" onclick="toggleTag(this)">运营<span class="tag-remove" onclick="removePresetTag(this, '运营')">×</span></span>
            <span class="tag-option" data-tag="市场" onclick="toggleTag(this)">市场<span class="tag-remove" onclick="removePresetTag(this, '市场')">×</span></span>
            <span class="tag-option" data-tag="销售" onclick="toggleTag(this)">销售<span class="tag-remove" onclick="removePresetTag(this, '销售')">×</span></span>
            <span class="tag-option" data-tag="应届生" onclick="toggleTag(this)">应届生<span class="tag-remove" onclick="removePresetTag(this, '应届生')">×</span></span>
          </div>
          <div class="custom-tag-row">
            <input class="custom-tag-input" id="customTagInput" placeholder="自定义标签..." onkeydown="if(event.key==='Enter') addCustomTag()" />
            <button class="add-tag-btn" onclick="addCustomTag()">+ 添加</button>
          </div>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="submitJob()">🚀 立即发布</button>
      </div>
    </div>

    <!-- Batch Import -->
    <div id="batchTab" style="display:none;">
      <div class="form-card">
        <h3>📋 批量导入</h3>
        
        <div class="form-group">
          <label class="form-label">粘贴多条职位信息（用空行或【Base地】分隔每条）</label>
          <textarea class="form-textarea" id="batchInput" style="min-height: 300px;" placeholder="【Base地】北京【公司名称】CICC【公司介绍】金融公司【岗位名称】实习生【岗位介绍/岗位职责】实习【岗位要求】在校生【岗位收获/薪酬】3k/月【简历投递方式/申请链接】xxxx@outlook.com【其他备注】需要现场实习

【Base地】深圳【公司名称】腾讯【公司介绍】互联网公司【岗位名称】实习生【岗位介绍/岗位职责】实习【岗位要求】在校生【岗位收获/薪酬】5k/月【简历投递方式/申请链接】xqqqx@outlook.com【其他备注】需要现场实习"></textarea>
        </div>
        
        <button class="submit-btn" onclick="parseBatch()" style="margin-bottom: 16px;">🔍 智能解析（将根据"单条发布"页面的标签库自动匹配）</button>
        
        <div class="form-group">
          <label class="form-label">解析预览（<span id="parseCount">0</span>条）</label>
          <div class="parse-preview" id="parsePreview">
            <div class="parse-empty">粘贴内容后点击"智能解析"查看结果</div>
          </div>
        </div>
        
        <button class="submit-btn" id="batchSubmitBtn" onclick="submitBatch()" disabled>📤 批量发布全部</button>
      </div>
    </div>

    <!-- Post List -->
    <div id="listTab" style="display:none;">
      <div>
        <div class="section-title">
          📋 信息列表
          <button class="refresh-btn" onclick="loadRecentPosts()">刷新</button>
        </div>
        <div class="list-search">
          <input type="text" class="list-search-input" id="listSearchInput" placeholder="搜索岗位、公司、地点..." oninput="filterPostList()">
        </div>
        <div class="batch-actions">
          <button class="select-all-btn" onclick="toggleSelectAll()">☑️ 全选</button>
          <button class="batch-delete-btn" id="batchDeleteBtn" onclick="batchDeleteJobs()" disabled>🗑 批量删除</button>
        </div>
        <div class="post-list" id="postList">
          <div class="empty-list">加载中...</div>
        </div>
      </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay hidden" id="editModal">

  // ---- Tab Switch ----

  }

  function addCustomTag() {
    const input = document.getElementById('customTagInput');
    const val = input.value.trim();
    if (!val) return;
    const selector = document.getElementById('tagSelector');
    const existing = [...selector.querySelectorAll('.tag-option')].find(t => t.dataset.tag === val);
    if (existing) { existing.classList.add('selected'); }
    else {
      const span = document.createElement('span');
      span.className = 'tag-option selected';
      span.dataset.tag = val;
      span.innerHTML = `${escHtml(val)}<span class="tag-remove" onclick="removeCustomTag(this, '${escHtml(val)}')">×</span>`;
      span.onclick = function(e) { if(e.target.classList.contains('tag-remove')) return; toggleTag(this); };
      selector.appendChild(span);
    }
    input.value = '';
  }

  function removeCustomTag(el, tagName) {
    el.parentElement.remove();
    // 从可用标签列表中移除
    const idx = availableTags.indexOf(tagName);
    if (idx > -1) availableTags.splice(idx, 1);
  }

  function getSelectedTags() {
    return [...document.querySelectorAll('.tag-option.selected')].map(t => t.dataset.tag);
  }

  // ---- Submit Single ----
  async function submitJob() {
    const base = document.getElementById('jobBase').value.trim();
    const company = document.getElementById('jobCompany').value.trim();
    const title = document.getElementById('jobTitle').value.trim();
    
    if (!title) { showToast('请填写【岗位名称】', 'error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '发布中...';

    // 组合content字段，包含所有规范化信息
    const contentParts = [];
    if (base) contentParts.push(`【Base地】${base}`);
    if (company) contentParts.push(`【公司名称】${company}`);
    if (document.getElementById('jobCompanyIntro').value.trim()) contentParts.push(`【公司介绍】${document.getElementById('jobCompanyIntro').value.trim()}`);
    if (document.getElementById('jobDesc').value.trim()) contentParts.push(`【岗位介绍/岗位职责】${document.getElementById('jobDesc').value.trim()}`);
    if (document.getElementById('jobRequirement').value.trim()) contentParts.push(`【岗位要求】${document.getElementById('jobRequirement').value.trim()}`);
    if (document.getElementById('jobSalary').value.trim()) contentParts.push(`【岗位收获/薪酬】${document.getElementById('jobSalary').value.trim()}`);
    if (document.getElementById('jobApply').value.trim()) contentParts.push(`【简历投递方式/申请链接】${document.getElementById('jobApply').value.trim()}`);
    if (document.getElementById('jobRemark').value.trim()) contentParts.push(`【其他备注】${document.getElementById('jobRemark').value.trim()}`);

    const payload = {
      title: title,
      company: company || null,
      location: base || null,
      content: contentParts.join('\n'),
      salary: document.getElementById('jobSalary').value.trim() || null,
      tags: getSelectedTags(),
    };

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error();
      showToast('发布成功！✅', 'success');
      clearForm();
    } catch (e) {
      showToast('发布失败，请检查配置', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '🚀 立即发布';
    }
  }

  function clearForm() {
    ['jobBase','jobCompany','jobTitle','jobCompanyIntro','jobDesc','jobRequirement','jobSalary','jobApply','jobRemark'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.querySelectorAll('.tag-option.selected').forEach(t => t.classList.remove('selected'));
  }

  // ---- Batch Parse (智能解析) ----
  function parseBatch() {
    const text = document.getElementById('batchInput').value.trim();
    if (!text) { showToast('请先粘贴内容', 'error'); return; }

    // 按【Base地】或空行拆分
    let blocks = text.split(/(?=\【Base地\】)/);
    if (blocks.length === 1) {
      blocks = text.split(/\n\s*\n/);
    }
    
    // 过滤空block
    blocks = blocks.filter(b => b.trim().length > 10);
    parsedJobs = [];

    blocks.forEach(block => {
      if (!block.trim()) return;
      const job = parseJobBlock(block);
      if (job) parsedJobs.push(job);
    });

    document.getElementById('parseCount').textContent = parsedJobs.length;
    renderParsePreview();
    
    const btn = document.getElementById('batchSubmitBtn');
    btn.disabled = parsedJobs.length === 0;
    btn.textContent = parsedJobs.length > 0 ? `📤 批量发布全部 (${parsedJobs.length}条)` : '📤 批量发布全部';
    
    if (parsedJobs.length === 0) {
      showToast('未能识别到有效职位信息', 'error');
    } else {
      showToast(`成功识别 ${parsedJobs.length} 条职位信息`, 'success');
    }
  }

  // 提取单个字段的辅助函数
  function extractField(block, fieldName) {
    // 匹配 【字段名】内容 直到下一个【 或 字符串结尾
    const regex = new RegExp('【' + fieldName + '】([\\s\\S]*?)(?=\\【|$)', 'i');
    const match = block.match(regex);
    if (match && match[1]) {
      // 去除首尾空白和换行
      return match[1].trim().replace(/^\n+/, '').replace(/\n+$/, '');
    }
    return '';
  }

  function parseJobBlock(block) {
    const job = {
      title: '',
      company: '',
      location: '',
      salary: '',
      companyIntro: '',
      jobDesc: '',
      jobReq: '',
      apply: '',
      remark: '',
      tags: []
    };

    // 提取各个字段
    job.location = extractField(block, 'Base地');
    job.company = extractField(block, '公司名称');
    job.title = extractField(block, '岗位名称');
    job.companyIntro = extractField(block, '公司介绍');
    job.jobDesc = extractField(block, '岗位介绍/岗位职责') || extractField(block, '岗位介绍') || extractField(block, '岗位职责');
    job.jobReq = extractField(block, '岗位要求');
    job.salary = extractField(block, '岗位收获/薪酬') || extractField(block, '薪酬') || extractField(block, '薪资');
    job.apply = extractField(block, '简历投递方式/申请链接') || extractField(block, '申请链接') || extractField(block, '投递方式');
    job.remark = extractField(block, '其他备注');

    // 构建content（用于显示）
    const contentParts = [];
    if (job.companyIntro) contentParts.push(`【公司介绍】${job.companyIntro}`);
    if (job.jobDesc) contentParts.push(`【岗位介绍/岗位职责】${job.jobDesc}`);
    if (job.jobReq) contentParts.push(`【岗位要求】${job.jobReq}`);
    if (job.salary) contentParts.push(`【岗位收获/薪酬】${job.salary}`);
    if (job.apply) contentParts.push(`【简历投递方式/申请链接】${job.apply}`);
    if (job.remark) contentParts.push(`【其他备注】${job.remark}`);
    job.content = contentParts.join('\n');

    // 智能标签 - 根据"单条发布"页面的标签库自动匹配
    // 1. 获取单条发布页面定义的标签库
    const singleTagSelector = document.getElementById('tagSelector');
    const singlePageTags = [...singleTagSelector.querySelectorAll('.tag-option')].map(t => t.dataset.tag);

    // 2. 工作类型判断（实习/兼职/全职只能选一个）
    if (singlePageTags.includes('实习') && /实习|在校|应届|校招/i.test(block)) {
      job.tags.push('实习');
    } else if (singlePageTags.includes('兼职') && /兼职|part-time/i.test(block)) {
      job.tags.push('兼职');
    } else if (singlePageTags.includes('全职')) {
      job.tags.push('全职');
    }

    // 3. 根据关键词匹配其他标签
    const tagKeywords = {
      '远程': [/远程|home.?office|在家|remote/i],
      '技术': [/前端|后端|开发|java|python|react|vue|算法|数据|测试|工程师|技术|编程|coding/i],
      '产品': [/产品|pm|product manager/i],
      '设计': [/设计|ui|ux|设计师|design/i],
      '运营': [/运营|用户运营|内容运营|活动运营/i],
      '市场': [/市场|营销|推广|品牌/i],
      '销售': [/销售|商务|客户|BD/i],
      '应届生': [/应届|校招|毕业生/i],
    };

    for (const [tag, patterns] of Object.entries(tagKeywords)) {
      // 只有当标签存在于单条发布页面定义的标签库中时才匹配
      if (singlePageTags.includes(tag)) {
        for (const pattern of patterns) {
          if (pattern.test(block)) {
            if (!job.tags.includes(tag)) job.tags.push(tag);
            break;
          }
        }
      }
    }

    // 如果没有标题，用公司+岗位
    if (!job.title) {
      job.title = job.company ? `${job.company} · ${job.location || '职位'}` : '职位信息';
    }

    return job;
  }

  // 可用标签列表
  const availableTags = ['全职', '兼职', '实习', '远程', '技术', '产品', '设计', '运营', '市场', '销售', '应届生'];

  function renderParsePreview() {
    const container = document.getElementById('parsePreview');
    if (parsedJobs.length === 0) {
      container.innerHTML = '<div class="parse-empty">未识别到有效职位信息</div>';
      return;
    }

    container.innerHTML = parsedJobs.map((job, i) => `
      <div class="edit-item" data-index="${i}">
        <div class="edit-item-header">
          <span class="edit-item-num">职位 ${i+1}</span>
          <button class="edit-item-remove" onclick="removeParsedJob(${i})" title="移除">✕</button>
        </div>
        <div class="edit-row">
          <div class="edit-field">
            <label class="edit-label">岗位名称</label>
            <input class="edit-input" id="edit-title-${i}" value="${escHtml(job.title || '')}">
          </div>
          <div class="edit-field">
            <label class="edit-label">公司名称</label>
            <input class="edit-input" id="edit-company-${i}" value="${escHtml(job.company || '')}">
          </div>
          <div class="edit-field">
            <label class="edit-label">Base地</label>
            <input class="edit-input" id="edit-location-${i}" value="${escHtml(job.location || '')}">
          </div>
        </div>
        <div class="edit-row">
          <div class="edit-field">
            <label class="edit-label">薪酬/薪资</label>
            <input class="edit-input" id="edit-salary-${i}" value="${escHtml(job.salary || '')}">
          </div>
        </div>
        <div class="edit-row">
          <div class="edit-field" style="flex:1">
            <label class="edit-label">公司介绍</label>
            <textarea class="edit-textarea" id="edit-companyIntro-${i}">${escHtml(job.companyIntro || '')}</textarea>
          </div>
        </div>
        <div class="edit-row">
          <div class="edit-field" style="flex:1">
            <label class="edit-label">岗位介绍/职责</label>
            <textarea class="edit-textarea" id="edit-jobDesc-${i}">${escHtml(job.jobDesc || '')}</textarea>
          </div>
        </div>
        <div class="edit-row">
          <div class="edit-field" style="flex:1">
            <label class="edit-label">岗位要求</label>
            <textarea class="edit-textarea" id="edit-jobReq-${i}">${escHtml(job.jobReq || '')}</textarea>
          </div>
        </div>
        <div class="edit-row">
          <div class="edit-field" style="flex:1">
            <label class="edit-label">简历投递方式/申请链接</label>
            <input class="edit-input" id="edit-apply-${i}" value="${escHtml(job.apply || '')}">
          </div>
        </div>
        <div class="edit-row">
          <div class="edit-field" style="flex:1">
            <label class="edit-label">其他备注</label>
            <input class="edit-input" id="edit-remark-${i}" value="${escHtml(job.remark || '')}">
          </div>
        </div>
        <div class="edit-tags-row">
          <label class="edit-label" style="margin:0">标签：</label>
          ${(function() {
            // 获取单条发布页面的标签库
            const singleTagSelector = document.getElementById('tagSelector');
            const singlePageTags = [...singleTagSelector.querySelectorAll('.tag-option')].map(t => t.dataset.tag);
            return singlePageTags.map(tag => `
              <button class="edit-tag-btn ${(job.tags||[]).includes(tag)?'selected':''}"
                data-index="${i}" data-tag="${tag}" onclick="toggleEditTag(this)">${tag}</button>
            `).join('');
          })()}
        </div>
      </div>
    `).join('');
  }

  function removeParsedJob(index) {
    parsedJobs.splice(index, 1);
    document.getElementById('parseCount').textContent = parsedJobs.length;
    const btn = document.getElementById('batchSubmitBtn');
    btn.disabled = parsedJobs.length === 0;
    btn.textContent = parsedJobs.length > 0 ? `📤 批量发布全部 (${parsedJobs.length}条)` : '📤 批量发布全部';
    renderParsePreview();
  }

  function toggleEditTag(btn) {
    btn.classList.toggle('selected');
  }

  // 从编辑表单收集数据
  function collectEditedJobs() {
    return parsedJobs.map((job, i) => {
      const title = document.getElementById(`edit-title-${i}`).value.trim();
      const company = document.getElementById(`edit-company-${i}`).value.trim();
      const location = document.getElementById(`edit-location-${i}`).value.trim();
      const salary = document.getElementById(`edit-salary-${i}`).value.trim();
      const companyIntro = document.getElementById(`edit-companyIntro-${i}`).value.trim();
      const jobDesc = document.getElementById(`edit-jobDesc-${i}`).value.trim();
      const jobReq = document.getElementById(`edit-jobReq-${i}`).value.trim();
      const apply = document.getElementById(`edit-apply-${i}`).value.trim();
      const remark = document.getElementById(`edit-remark-${i}`).value.trim();

      // 收集选中的标签
      const selectedTags = [...document.querySelectorAll(`.edit-tag-btn[data-index="${i}"].selected`)].map(b => b.dataset.tag);

      // 构建content字段
      let content = '';
      if (companyIntro) content += `【公司介绍】${companyIntro}\n`;
      if (jobDesc) content += `【岗位介绍/岗位职责】${jobDesc}\n`;
      if (jobReq) content += `【岗位要求】${jobReq}\n`;
      if (salary) content += `【岗位收获/薪酬】${salary}\n`;
      if (apply) content += `【简历投递方式/申请链接】${apply}\n`;
      if (remark) content += `【其他备注】${remark}\n`;

      return {
        title,
        company,
        location,
        salary,
        content,
        tags: selectedTags
      };
    });
  }

  // ---- Submit Batch ----
  async function submitBatch() {
    if (parsedJobs.length === 0) return;

    const btn = document.getElementById('batchSubmitBtn');
    btn.disabled = true;
    btn.textContent = '发布中...';

    // 获取编辑后的数据
    const jobsToSubmit = collectEditedJobs();

    let successCount = 0;

    for (const job of jobsToSubmit) {
      if (!job.title) continue; // 跳过空标题
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal',
          },
          body: JSON.stringify({
            title: job.title,
            company: job.company || null,
            location: job.location || null,
            content: job.content,
            salary: job.salary || null,
            tags: job.tags,
          }),
        });
        if (res.ok) successCount++;
      } catch (e) {}
    }

    showToast(`成功发布 ${successCount} 条信息！✅`, 'success');
    document.getElementById('batchInput').value = '';
    parsedJobs = [];
    document.getElementById('parseCount').textContent = '0';
    document.getElementById('parsePreview').innerHTML = '<div class="parse-empty">粘贴内容后点击"智能解析"查看结果</div>';
    btn.disabled = true;
    btn.textContent = '📤 批量发布全部';
  }

  // ---- Recent Posts ----
  let allJobsList = [];

  async function loadRecentPosts() {
    const list = document.getElementById('postList');
    list.innerHTML = '<div class="empty-list">加载中...</div>';
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/${TABLE_NAME}?select=*&order=created_at.desc&limit=50`,
        { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      allJobsList = await res.json();
      filterPostList();
    } catch(e) { list.innerHTML = '<div class="empty-list">加载失败</div>'; }
  }

  function filterPostList() {
    const query = document.getElementById('listSearchInput').value.trim().toLowerCase();
    const list = document.getElementById('postList');

    let jobs = allJobsList;
    if (query) {
      jobs = jobs.filter(j =>
        (j.title || '').toLowerCase().includes(query) ||
        (j.company || '').toLowerCase().includes(query) ||
        (j.location || '').toLowerCase().includes(query) ||
        (j.content || '').toLowerCase().includes(query)
      );
    }

    if (!jobs.length) {
      list.innerHTML = '<div class="empty-list">' + (query ? '没有找到匹配的结果' : '暂无发布记录') + '</div>';
      return;
    }

    list.innerHTML = jobs.map(job => `
      <div class="post-item" id="item-${job.id}">
        <input type="checkbox" class="post-checkbox" value="${job.id}" onchange="updateBatchDeleteBtn()">
        <div class="post-item-info">
          <div class="post-item-title">${escHtml(job.title || '无标题')}</div>
          <div class="post-item-meta">
            ${job.company ? `<span>🏢 ${escHtml(job.company)}</span>` : ''}
            ${job.location ? `<span>📍 ${escHtml(job.location)}</span>` : ''}
            <span>🕐 ${formatTime(job.created_at)}</span>
          </div>
          <div class="post-item-tags">
            ${(job.tags||[]).map(t => `<span class="mini-tag">${t}</span>`).join('')}
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="edit-btn" onclick="openEditModal('${job.id}')" title="编辑">✏️</button>
          <button class="delete-btn" onclick="deleteJob('${job.id}')" title="删除">🗑</button>
        </div>
      </div>
    `).join('');

    updateBatchDeleteBtn();
  }

  function toggleSelectAll() {
    const checkboxes = document.querySelectorAll('.post-checkbox');
    const allChecked = [...checkboxes].every(c => c.checked);
    checkboxes.forEach(c => c.checked = !allChecked);
    updateBatchDeleteBtn();
  }

  function updateBatchDeleteBtn() {
    const checked = document.querySelectorAll('.post-checkbox:checked');
    const btn = document.getElementById('batchDeleteBtn');
    btn.disabled = checked.length === 0;
    btn.textContent = checked.length > 0 ? `🗑 批量删除 (${checked.length})` : '🗑 批量删除';
  }

  async function batchDeleteJobs() {
    const checked = document.querySelectorAll('.post-checkbox:checked');
    if (checked.length === 0) return;
    if (!confirm(`确定要删除选中的 ${checked.length} 条信息吗？`)) return;

    const ids = [...checked].map(c => c.value);
    let successCount = 0;

    for (const id of ids) {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?id=eq.${id}`, {
          method: 'DELETE',
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        if (res.ok) successCount++;
      } catch (e) {}
    }

    showToast(`成功删除 ${successCount} 条信息！`, 'success');
    loadRecentPosts();
  }

  // ---- Edit Modal ----
  let editingJobId = null;

  function openEditModal(id) {
    const job = allJobsList.find(j => j.id == id);
    if (!job) return;
    editingJobId = id;

    // 从content中提取字段
    const getContent = (key) => {
      const match = job.content && job.content.match(new RegExp(key + '([^【]+?)(?=\\【|$)'));
      return match ? match[1].trim() : '';
    };

    document.getElementById('editModalBody').innerHTML = `
      <div class="edit-row">
        <div class="edit-field">
          <label class="edit-label">岗位名称</label>
          <input class="edit-input" id="modal-title" value="${escHtml(job.title || '')}">
        </div>
        <div class="edit-field">
          <label class="edit-label">公司名称</label>
          <input class="edit-input" id="modal-company" value="${escHtml(job.company || '')}">
        </div>
        <div class="edit-field">
          <label class="edit-label">Base地</label>
          <input class="edit-input" id="modal-location" value="${escHtml(job.location || '')}">
        </div>
      </div>
      <div class="edit-row">
        <div class="edit-field">
          <label class="edit-label">薪酬/薪资</label>
          <input class="edit-input" id="modal-salary" value="${escHtml(job.salary || '')}">
        </div>
      </div>
      <div class="edit-row">
        <div class="edit-field" style="flex:1">
          <label class="edit-label">公司介绍</label>
          <textarea class="edit-textarea" id="modal-companyIntro">${escHtml(getContent('【公司介绍】'))}</textarea>
        </div>
      </div>
      <div class="edit-row">
        <div class="edit-field" style="flex:1">
          <label class="edit-label">岗位介绍/职责</label>
          <textarea class="edit-textarea" id="modal-jobDesc">${escHtml(getContent('【岗位介绍/岗位职责】'))}</textarea>
        </div>
      </div>
      <div class="edit-row">
        <div class="edit-field" style="flex:1">
          <label class="edit-label">岗位要求</label>
          <textarea class="edit-textarea" id="modal-jobReq">${escHtml(getContent('【岗位要求】'))}</textarea>
        </div>
      </div>
      <div class="edit-row">
        <div class="edit-field" style="flex:1">
          <label class="edit-label">简历投递方式/申请链接</label>
          <input class="edit-input" id="modal-apply" value="${escHtml(getContent('【简历投递方式/申请链接】'))}">
        </div>
      </div>
      <div class="edit-row">
        <div class="edit-field" style="flex:1">
          <label class="edit-label">其他备注</label>
          <input class="edit-input" id="modal-remark" value="${escHtml(getContent('【其他备注】'))}">
        </div>
      </div>
      <div class="edit-tags-row">
        <label class="edit-label" style="margin:0">标签：</label>
        ${availableTags.map(tag => `
          <button class="edit-tag-btn ${(job.tags||[]).includes(tag)?'selected':''}" 
            data-tag="${tag}" onclick="this.classList.toggle('selected')">${tag}</button>
        `).join('')}
      </div>
    `;

    document.getElementById('editModal').classList.remove('hidden');
  }

  function closeEditModal() {
    document.getElementById('editModal').classList.add('hidden');
    editingJobId = null;
  }

  async function saveEditJob() {
    if (!editingJobId) return;

    const title = document.getElementById('modal-title').value.trim();
    if (!title) { showToast('岗位名称不能为空', 'error'); return; }

    const company = document.getElementById('modal-company').value.trim();
    const location = document.getElementById('modal-location').value.trim();
    const salary = document.getElementById('modal-salary').value.trim();
    const companyIntro = document.getElementById('modal-companyIntro').value.trim();
    const jobDesc = document.getElementById('modal-jobDesc').value.trim();
    const jobReq = document.getElementById('modal-jobReq').value.trim();
    const apply = document.getElementById('modal-apply').value.trim();
    const remark = document.getElementById('modal-remark').value.trim();

    const selectedTags = [...document.querySelectorAll('#editModalBody .edit-tag-btn.selected')].map(b => b.dataset.tag);

    let content = '';
    if (companyIntro) content += `【公司介绍】${companyIntro}\n`;
    if (jobDesc) content += `【岗位介绍/岗位职责】${jobDesc}\n`;
    if (jobReq) content += `【岗位要求】${jobReq}\n`;
    if (salary) content += `【岗位收获/薪酬】${salary}\n`;
    if (apply) content += `【简历投递方式/申请链接】${apply}\n`;
    if (remark) content += `【其他备注】${remark}\n`;

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?id=eq.${editingJobId}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({
          title,
          company: company || null,
          location: location || null,
          salary: salary || null,
          content,
          tags: selectedTags,
        }),
      });

      if (res.ok) {
        showToast('修改成功！✅', 'success');
        closeEditModal();
        loadRecentPosts();
      } else {
        showToast('修改失败', 'error');
      }
    } catch(e) {
      showToast('修改失败', 'error');
    }
  }

  // ---- Delete ----
  async function deleteJob(id) {
    if (!confirm('确定要删除这条信息吗？')) return;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?id=eq.${id}`, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
      });
      if (res.ok) {
        const el = document.getElementById(`item-${id}`);
        if (el) el.remove();
        showToast('已删除', 'success');
      }
    } catch { showToast('删除失败', 'error'); }
  }

  // ---- Toast ----
  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.classList.remove('show'); }, 3000);
  }

  // ---- Helpers ----
  function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function formatTime(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return '刚刚';
    if (diff < 3600) return `${Math.floor(diff/60)} 分钟前`;
    if (diff < 86400) return `${Math.floor(diff/3600)} 小时前`;
    return `${d.getMonth()+1}月${d.getDate()}日`;
  }
</script>
</body>
