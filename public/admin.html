<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 — Mina's Cafeteria</title>
  <style>
    :root {
      --primary: #8B7355;
      --primary-dark: #6F4E37;
      --danger: #ff4757;
      --bg: #FAF8F5;
      --card-bg: #ffffff;
      --text: #3D3229;
      --muted: #8B8178;
      --border: #E8E2DB;
      --shadow: 0 2px 12px rgba(61,50,41,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== LOGIN SCREEN ===== */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      text-align: center;
    }
    .login-icon {
      width: 60px;
      height: 60px;
      background: var(--primary);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 20px;
    }
    .login-card h2 { font-size: 22px; margin-bottom: 6px; }
    .login-card p { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
    .login-input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      transition: border 0.2s;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 16px;
    }
    .login-input:focus { border-color: var(--primary); }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: var(--primary-dark); }
    .login-error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    /* ===== ADMIN SCREEN ===== */
    #adminScreen { display: none; }

    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    .header-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .header-title { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .logout-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--muted);
    }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    .container { max-width: 760px; margin: 0 auto; padding: 24px 16px; }

    /* ===== TABS ===== */
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .tab-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ===== FORM CARD ===== */
    .form-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .form-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
      font-family: inherit;
      color: var(--text);
      background: #fff;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--primary); }
    .form-textarea { resize: vertical; min-height: 140px; line-height: 1.7; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 520px) { .form-row { grid-template-columns: 1fr; } }

    /* ===== FILE UPLOAD AREA ===== */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--bg);
      margin-bottom: 16px;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: var(--primary);
      background: #fdfcfa;
    }
    .upload-area.disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .upload-icon { font-size: 36px; margin-bottom: 10px; }
    .upload-text { font-size: 14px; color: var(--muted); }
    .upload-text strong { color: var(--primary); }
    .upload-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }
    
    .file-input { display: none; }
    
    /* ===== PROCESSING STATUS ===== */
    .processing-status {
      background: var(--bg);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      display: none;
    }
    .processing-status.active { display: block; }
    .processing-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .processing-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .processing-text { font-size: 14px; font-weight: 500; }
    .processing-progress { font-size: 12px; color: var(--muted); }
    .processing-preview {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      max-height: 120px;
      overflow-y: auto;
      white-space: pre-wrap;
      color: var(--muted);
    }

    /* ===== TAG SELECTOR ===== */
    .tag-selector { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-option {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      color: var(--muted);
    }
    .tag-option.selected { background: var(--primary); border-color: var(--primary); color: #fff; font-weight: 600; }
    .tag-option:hover:not(.selected) { border-color: var(--primary); color: var(--primary); }
    .custom-tag-row { display: flex; gap: 8px; margin-top: 10px; }
    .custom-tag-input {
      flex: 1;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      outline: none;
    }
    .custom-tag-input:focus { border-color: var(--primary); }
    .add-tag-btn {
      padding: 8px 16px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .add-tag-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* ===== SUBMIT BUTTON ===== */
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .submit-btn:hover { background: var(--primary-dark); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { background: var(--border); cursor: not-allowed; color: var(--muted); }

    /* ===== PARSE PREVIEW ===== */
    .parse-preview { margin-top: 16px; }
    .parse-item {
      background: var(--bg);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }
    .parse-item:hover { border-color: var(--primary); }
    .parse-item-title { font-weight: 600; margin-bottom: 6px; }
    .parse-item-meta { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .parse-item-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .mini-tag { background: #fff; color: var(--primary); font-size: 11px; padding: 2px 8px; border-radius: 8px; border: 1px solid var(--primary); }
    .parse-empty { text-align: center; padding: 20px; color: var(--muted); font-size: 14px; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #333;
      color: #fff;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.3s ease;
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--primary); }
    .toast.error { background: var(--danger); }

    /* ===== RECENT POSTS ===== */
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .refresh-btn {
      font-size: 13px;
      color: var(--primary);
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    .post-list { display: flex; flex-direction: column; gap: 10px; }
    .post-item {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .post-item-info { flex: 1; min-width: 0; }
    .post-item-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-item-meta { font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }
    .post-item-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .mini-tag { background: #e8f8ef; color: var(--primary); font-size: 11px; padding: 2px 8px; border-radius: 8px; }
    .delete-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px; border-radius: 6px; flex-shrink: 0; }
    .delete-btn:hover { color: var(--danger); }
    .empty-list { text-align: center; padding: 32px; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h2>管理员登录</h2>
    <p>请输入管理密码以发布求职信息</p>
    <input type="password" class="login-input" id="passwordInput" placeholder="输入密码" onkeydown="if(event.key==='Enter') doLogin()" />
    <button class="login-btn" onclick="doLogin()">登录</button>
    <div class="login-error" id="loginError">密码错误，请重试</div>
  </div>
</div>

<!-- Admin Screen -->
<div id="adminScreen">
  <header>
    <div class="header-inner">
      <div class="header-title">💼 管理后台</div>
      <button class="logout-btn" onclick="doLogout()">退出登录</button>
    </div>
  </header>

  <div class="container">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('single')" id="tabSingle">单条发布</button>
      <button class="tab-btn" onclick="switchTab('batch')" id="tabBatch">批量导入</button>
      <button class="tab-btn" onclick="switchTab('list')" id="tabList">信息列表</button>
    </div>

    <!-- Single Form -->
    <div id="singleTab">
      <div class="form-card">
        <h3>✏️ 发布新信息</h3>
        <div class="form-group">
          <label class="form-label">信息标题（必填）</label>
          <input class="form-input" id="jobTitle" placeholder="例：前端工程师 · 字节跳动 · 30K-50K" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">公司名称</label>
            <input class="form-input" id="jobCompany" placeholder="例：字节跳动" />
          </div>
          <div class="form-group">
            <label class="form-label">工作地点</label>
            <input class="form-input" id="jobLocation" placeholder="例：北京 / 远程" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">薪资范围</label>
          <input class="form-input" id="jobSalary" placeholder="例：20K-35K · 15薪" />
        </div>
        <div class="form-group">
          <label class="form-label">详细内容</label>
          <textarea class="form-textarea" id="jobContent" placeholder="直接粘贴群里的原文消息..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">选择标签（可多选）</label>
          <div class="tag-selector" id="tagSelector">
            <span class="tag-option" data-tag="全职" onclick="toggleTag(this)">全职</span>
            <span class="tag-option" data-tag="兼职" onclick="toggleTag(this)">兼职</span>
            <span class="tag-option" data-tag="实习" onclick="toggleTag(this)">实习</span>
            <span class="tag-option" data-tag="远程" onclick="toggleTag(this)">远程</span>
            <span class="tag-option" data-tag="技术" onclick="toggleTag(this)">技术</span>
            <span class="tag-option" data-tag="设计" onclick="toggleTag(this)">设计</span>
            <span class="tag-option" data-tag="产品" onclick="toggleTag(this)">产品</span>
            <span class="tag-option" data-tag="运营" onclick="toggleTag(this)">运营</span>
            <span class="tag-option" data-tag="市场" onclick="toggleTag(this)">市场</span>
            <span class="tag-option" data-tag="销售" onclick="toggleTag(this)">销售</span>
            <span class="tag-option" data-tag="应届生" onclick="toggleTag(this)">应届生</span>
          </div>
          <div class="custom-tag-row">
            <input class="custom-tag-input" id="customTagInput" placeholder="自定义标签..." onkeydown="if(event.key==='Enter') addCustomTag()" />
            <button class="add-tag-btn" onclick="addCustomTag()">+ 添加</button>
          </div>
        </div>
        <button class="submit-btn" id="submitBtn" onclick="submitJob()">🚀 立即发布</button>
      </div>
    </div>

    <!-- Batch Import -->
    <div id="batchTab" style="display:none;">
      <div class="form-card">
        <h3>📋 批量导入</h3>
        
        <!-- 文件上传区域 -->
        <div class="form-group">
          <label class="form-label">📎 上传文件（图片 / PDF / Word）</label>
          <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">拖拽文件到此处，或 <strong>点击选择文件</strong></div>
            <div class="upload-hint">支持 .jpg .png .gif .pdf .doc .docx，单个文件不超过10MB</div>
            <input type="file" class="file-input" id="fileInput" accept=".jpg,.jpeg,.png,.gif,.pdf,.doc,.docx" multiple />
          </div>
          
          <!-- 处理状态 -->
          <div class="processing-status" id="processingStatus">
            <div class="processing-header">
              <div class="processing-spinner"></div>
              <span class="processing-text" id="processingText">正在识别...</span>
            </div>
            <div class="processing-progress" id="processingProgress"></div>
            <div class="processing-preview" id="processingPreview" style="display:none;"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">📝 或粘贴文本（多条用空行分隔）</label>
          <textarea class="form-textarea" id="batchInput" style="min-height: 200px;" placeholder="【腾讯音乐投资并购实习生】
工作地点：北京
岗位要求：
1. 不限专业...
            
【字节跳动前端工程师】
地点：北京
薪资：25K-40K..."></textarea>
        </div>
        
        <button class="submit-btn" onclick="parseBatch()" style="margin-bottom: 16px;">🔍 智能解析全部</button>
        
        <div class="form-group">
          <label class="form-label">解析预览（<span id="parseCount">0</span>条，可编辑）</label>
          <div class="parse-preview" id="parsePreview">
            <div class="parse-empty">上传文件或粘贴文本后点击"智能解析"查看结果</div>
          </div>
        </div>
        
        <button class="submit-btn" id="batchSubmitBtn" onclick="submitBatch()" disabled>📤 批量发布全部</button>
      </div>
    </div>

    <!-- Post List -->
    <div id="listTab" style="display:none;">
      <div>
        <div class="section-title">
          📋 最近发布
          <button class="refresh-btn" onclick="loadRecentPosts()">刷新</button>
        </div>
        <div class="post-list" id="postList">
          <div class="empty-list">加载中...</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>

<script>
  // ============================================================
  // CONFIG
  // ============================================================
  const SUPABASE_URL = 'https://qebvxqxonoudtkjclyxv.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlYnZ4cXhvbm91ZHRramNseXh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTgwNjAsImV4cCI6MjA4OTU3NDA2MH0.HLAE_56UQBoWEmUghQKK_rTigExQvQwGWZ0dhzGXUM4';
  const TABLE_NAME = 'jobs';
  const ADMIN_PASSWORD = 'job123456';
  // ============================================================

  let parsedJobs = [];
  let extractedText = ''; // 从文件识别出来的文本

  // ---- Tab Switch ----
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    document.getElementById('singleTab').style.display = tab === 'single' ? 'block' : 'none';
    document.getElementById('batchTab').style.display = tab === 'batch' ? 'block' : 'none';
    document.getElementById('listTab').style.display = tab === 'list' ? 'block' : 'none';
    if (tab === 'list') loadRecentPosts();
  }

  // ---- Login ----
  function doLogin() {
    const pwd = document.getElementById('passwordInput').value;
    if (pwd === ADMIN_PASSWORD) {
      sessionStorage.setItem('admin_auth', '1');
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('passwordInput').value = '';
    }
  }

  function doLogout() {
    sessionStorage.removeItem('admin_auth');
    location.reload();
  }

  if (sessionStorage.getItem('admin_auth') === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
  }

  // ---- File Upload Handling ----
  const uploadArea = document.getElementById('uploadArea');
  const fileInput = document.getElementById('fileInput');

  uploadArea.addEventListener('click', () => fileInput.click());
  
  uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });
  
  uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
  });
  
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const files = e.dataTransfer.files;
    if (files.length) handleFiles(files);
  });
  
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) handleFiles(fileInput.files);
  });

  async function handleFiles(files) {
    const statusEl = document.getElementById('processingStatus');
    const textEl = document.getElementById('processingText');
    const progressEl = document.getElementById('processingProgress');
    const previewEl = document.getElementById('processingPreview');
    
    statusEl.classList.add('active');
    previewEl.style.display = 'none';
    extractedText = '';
    
    const textParts = [];
    
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const fileName = file.name.toLowerCase();
      
      textEl.textContent = `正在处理 ${i + 1}/${files.length}: ${file.name}`;
      progressEl.textContent = '';
      
      try {
        let text = '';
        
        if (fileName.match(/\.(jpg|jpeg|png|gif)$/)) {
          // 图片 - OCR识别
          text = await processImage(file, (p) => {
            progressEl.textContent = `识别进度: ${Math.round(p * 100)}%`;
          });
        } else if (fileName.endsWith('.pdf')) {
          // PDF解析
          text = await processPDF(file, (p) => {
            progressEl.textContent = `解析进度: ${Math.round(p * 100)}%`;
          });
        } else if (fileName.match(/\.(doc|docx)$/)) {
          // Word解析
          text = await processWord(file);
          progressEl.textContent = '解析完成';
        } else {
          showToast(`不支持的文件类型: ${file.name}`, 'error');
          continue;
        }
        
        if (text.trim()) {
          textParts.push(text.trim());
          progressEl.textContent = `✅ 已识别 ${text.length} 个字符`;
        }
      } catch (err) {
        console.error(err);
        progressEl.textContent = `❌ 处理失败: ${err.message}`;
      }
    }
    
    extractedText = textParts.join('\n\n---\n\n');
    
    if (extractedText) {
      previewEl.textContent = extractedText.substring(0, 500) + (extractedText.length > 500 ? '...' : '');
      previewEl.style.display = 'block';
      
      // 自动填入文本框
      const batchInput = document.getElementById('batchInput');
      if (batchInput.value.trim()) {
        batchInput.value = batchInput.value + '\n\n' + extractedText;
      } else {
        batchInput.value = extractedText;
      }
      
      showToast('文件识别完成，请点击"智能解析"', 'success');
    }
    
    setTimeout(() => {
      statusEl.classList.remove('active');
    }, 2000);
  }

  // ---- Image OCR (Tesseract.js) ----
  async function processImage(file, onProgress) {
    showToast('正在识别图片文字，请稍候...', 'success');
    
    const result = await Tesseract.recognize(file, 'chi_sim+eng', {
      logger: m => {
        if (m.status === 'recognizing text') {
          onProgress(m.progress);
        }
      }
    });
    
    return result.data.text;
  }

  // ---- PDF Parsing (pdf.js) ----
  async function processPDF(file, onProgress) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    
    let fullText = '';
    const totalPages = pdf.numPages;
    
    for (let i = 1; i <= totalPages; i++) {
      const page = await pdf.getPage(i);
      const textContent = await page.getTextContent();
      const pageText = textContent.items.map(item => item.str).join(' ');
      fullText += pageText + '\n';
      onProgress(i / totalPages);
    }
    
    return fullText;
  }

  // ---- Word Parsing (mammoth.js) ----
  async function processWord(file) {
    const arrayBuffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
    return result.value;
  }

  // ---- Tag toggle ----
  function toggleTag(el) { el.classList.toggle('selected'); }

  function addCustomTag() {
    const input = document.getElementById('customTagInput');
    const val = input.value.trim();
    if (!val) return;
    const selector = document.getElementById('tagSelector');
    const existing = [...selector.querySelectorAll('.tag-option')].find(t => t.dataset.tag === val);
    if (existing) { existing.classList.add('selected'); }
    else {
      const span = document.createElement('span');
      span.className = 'tag-option selected';
      span.dataset.tag = val;
      span.textContent = val;
      span.onclick = function() { toggleTag(this); };
      selector.appendChild(span);
    }
    input.value = '';
  }

  function getSelectedTags() {
    return [...document.querySelectorAll('.tag-option.selected')].map(t => t.dataset.tag);
  }

  // ---- Submit Single ----
  async function submitJob() {
    const title = document.getElementById('jobTitle').value.trim();
    const content = document.getElementById('jobContent').value.trim();
    if (!title) { showToast('请填写标题', 'error'); return; }
    if (!content) { showToast('请填写详细内容', 'error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '发布中...';

    const payload = {
      title,
      content,
      company: document.getElementById('jobCompany').value.trim() || null,
      location: document.getElementById('jobLocation').value.trim() || null,
      salary: document.getElementById('jobSalary').value.trim() || null,
      tags: getSelectedTags(),
    };

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error();
      showToast('发布成功！✅', 'success');
      clearForm();
    } catch (e) {
      showToast('发布失败，请检查配置', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '🚀 立即发布';
    }
  }

  function clearForm() {
    ['jobTitle','jobCompany','jobLocation','jobSalary','jobContent'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.querySelectorAll('.tag-option.selected').forEach(t => t.classList.remove('selected'));
  }

  // ---- Batch Parse (智能解析) ----
  function parseBatch() {
    const text = document.getElementById('batchInput').value.trim();
    if (!text) { showToast('请先粘贴内容或上传文件', 'error'); return; }

    // 智能拆分：按空行分隔，同时也尝试按常见分隔符
    // 策略：先用空行，如果只有一条，尝试其他方式
    let blocks = text.split(/\n\s*\n/);
    
    // 如果只有一个block，尝试用更智能的方式拆分
    if (blocks.length === 1) {
      const singleText = blocks[0];
      // 尝试按"【XXX】"模式拆分
      if (singleText.includes('【')) {
        blocks = singleText.split(/(?=【)/);
      } 
      // 尝试按"职位"或"岗位"关键词拆分
      else if (/职位|岗位|招聘/.test(singleText)) {
        blocks = singleText.split(/(?=职位|岗位|招聘)/);
      }
    }
    
    // 过滤空block
    blocks = blocks.filter(b => b.trim().length > 10);
    
    parsedJobs = [];

    blocks.forEach(block => {
      if (!block.trim()) return;
      const job = parseJobBlock(block);
      if (job) parsedJobs.push(job);
    });

    document.getElementById('parseCount').textContent = parsedJobs.length;
    renderParsePreview();
    
    const btn = document.getElementById('batchSubmitBtn');
    btn.disabled = parsedJobs.length === 0;
    btn.textContent = parsedJobs.length > 0 ? `📤 批量发布全部 (${parsedJobs.length}条)` : '📤 批量发布全部';
    
    if (parsedJobs.length === 0) {
      showToast('未能识别到有效职位信息，请检查内容格式', 'error');
    } else {
      showToast(`成功识别 ${parsedJobs.length} 条职位信息`, 'success');
    }
  }

  function parseJobBlock(block) {
    const lines = block.split('\n');
    const job = { 
      title: '', 
      company: '', 
      location: '', 
      salary: '', 
      content: block.trim(), 
      tags: [] 
    };
    
    // 用于检测是否有效职位的关键词
    const jobKeywords = ['职位', '岗位', '招聘', '薪资', '工资', '要求', '职责', '工作地点', '公司', '实习', '全职', '兼职'];
    const hasJobKeyword = jobKeywords.some(kw => block.includes(kw));
    
    // 如果没有任何职位相关关键词，可能是无效内容
    if (!hasJobKeyword && block.length < 30) return null;
    
    lines.forEach(line => {
      line = line.trim();
      if (!line) return;
      
      // 移除可能的【】前缀
      const cleanLine = line.replace(/^【.*?】\s*/, '').replace(/^【.*?】/, '');
      
      // 职位/岗位
      if (/^职位|^岗位|^招聘|position|job|title/i.test(line) || /^【职位】|^【岗位】/.test(line)) {
        job.title = cleanLine;
      }
      // 公司
      else if (/^公司|^企业|^机构|company|corp/i.test(line) || /^【公司】/.test(line)) {
        job.company = cleanLine;
      }
      // 地点/地址
      else if (/^地点|^地址|^工作地点|^地点：|location|地点|address/i.test(line) || /^【地点】|^【地址】/.test(line)) {
        job.location = cleanLine;
      }
      // 薪资
      else if (/^薪资|^工资|^薪酬|^月薪|^日薪|salary|pay|薪资范围/i.test(line) || /^【薪资】|^【工资】|^【薪酬】/.test(line)) {
        job.salary = cleanLine;
      }
    });

    // 智能自动打标签
    const fullText = block.toLowerCase();
    
    // 实习/全职/兼职
    if (/实习|在校|应届|校招|管培生|graduate/i.test(fullText)) {
      job.tags.push('实习');
    } else if (/兼职|part-time|小时工|周末/i.test(fullText)) {
      job.tags.push('兼职');
    } else {
      job.tags.push('全职');
    }
    
    // 应届生
    if (/应届|0-2年|1-3年|经验不限|无经验/i.test(fullText)) {
      job.tags.push('应届生');
    }
    
    // 远程
    if (/远程|home.?office|在家|线上|可远程/i.test(fullText)) {
      job.tags.push('远程');
    }
    
    // 职位类型
    if (/前端|后端|全栈|开发|engineer|dev|react|vue|java|python|javascript|php|go|rust|算法|数据|测试|qa|iOS|android|客户端|服务器|研发/i.test(fullText)) {
      job.tags.push('技术');
    }
    if (/产品|product|pm|需求|功能/i.test(fullText)) {
      job.tags.push('产品');
    }
    if (/设计|design|ui|ux|视觉|交互|美术|插画/i.test(fullText)) {
      job.tags.push('设计');
    }
    if (/运营|operation|用户|社群|内容|新媒体/i.test(fullText)) {
      job.tags.push('运营');
    }
    if (/市场|marketing|品牌|推广|渠道|商务|BD/i.test(fullText)) {
      job.tags.push('市场');
    }
    if (/销售|sales|商务|客户|业绩/i.test(fullText)) {
      job.tags.push('销售');
    }
    if (/财务|会计|金融|投资|风控|审计/i.test(fullText)) {
      job.tags.push('金融');
    }
    if (/人力|HR|招聘|行政|前台|总助|文秘/i.test(fullText)) {
      job.tags.push('职能');
    }

    // 生成标题
    if (!job.title) {
      const parts = [];
      // 尝试从第一行提取职位名
      const firstLine = lines[0]?.replace(/^【.*?】\s*/, '').trim();
      if (firstLine && firstLine.length < 50) {
        parts.push(firstLine);
      }
      if (job.company) parts.push(job.company);
      if (job.location) parts.push(job.location);
      if (job.salary) parts.push(job.salary);
      job.title = parts.length > 0 ? parts.join(' · ') : '职位信息';
    }

    return job;
  }

  function renderParsePreview() {
    const container = document.getElementById('parsePreview');
    if (parsedJobs.length === 0) {
      container.innerHTML = '<div class="parse-empty">未识别到有效职位信息</div>';
      return;
    }
    
    container.innerHTML = parsedJobs.map((job, i) => `
      <div class="parse-item">
        <div class="parse-item-title">${i+1}. ${escHtml(job.title)}</div>
        <div class="parse-item-meta">
          ${job.company ? '🏢 ' + escHtml(job.company) : ''}
          ${job.location ? ' 📍 ' + escHtml(job.location) : ''}
          ${job.salary ? ' 💰 ' + escHtml(job.salary) : ''}
        </div>
        <div class="parse-item-tags">
          ${job.tags.map(t => `<span class="mini-tag">${t}</span>`).join('')}
        </div>
      </div>
    `).join('');
  }

  // ---- Submit Batch ----
  async function submitBatch() {
    if (parsedJobs.length === 0) return;
    
    const btn = document.getElementById('batchSubmitBtn');
    btn.disabled = true;
    btn.textContent = '发布中...';
    
    let successCount = 0;
    
    for (const job of parsedJobs) {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal',
          },
          body: JSON.stringify(job),
        });
        if (res.ok) successCount++;
      } catch (e) {}
    }
    
    showToast(`成功发布 ${successCount} 条信息！✅`, 'success');
    document.getElementById('batchInput').value = '';
    extractedText = '';
    parsedJobs = [];
    document.getElementById('parseCount').textContent = '0';
    document.getElementById('parsePreview').innerHTML = '<div class="parse-empty">上传文件或粘贴文本后点击"智能解析"查看结果</div>';
    btn.disabled = true;
    btn.textContent = '📤 批量发布全部';
  }

  // ---- Recent Posts ----
  async function loadRecentPosts() {
    const list = document.getElementById('postList');
    list.innerHTML = '<div class="empty-list">加载中...</div>';
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/${TABLE_NAME}?select=*&order=created_at.desc&limit=20`,
        { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      const jobs = await res.json();
      if (!jobs.length) { list.innerHTML = '<div class="empty-list">暂无发布记录</div>'; return; }
      list.innerHTML = jobs.map(job => `
        <div class="post-item" id="item-${job.id}">
          <div class="post-item-info">
            <div class="post-item-title">${escHtml(job.title || '无标题')}</div>
            <div class="post-item-meta">
              ${job.company ? `<span>🏢 ${escHtml(job.company)}</span>` : ''}
              ${job.location ? `<span>📍 ${escHtml(job.location)}</span>` : ''}
              <span>🕐 ${formatTime(job.created_at)}</span>
            </div>
            <div class="post-item-tags">
              ${(job.tags||[]).map(t => `<span class="mini-tag">${t}</span>`).join('')}
            </div>
          </div>
          <button class="delete-btn" onclick="deleteJob('${job.id}')" title="删除">🗑</button>
        </div>
      `).join('');
    } catch(e) { list.innerHTML = '<div class="empty-list">加载失败</div>'; }
  }

  // ---- Delete ----
  async function deleteJob(id) {
    if (!confirm('确定要删除这条信息吗？')) return;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?id=eq.${id}`, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
      });
      if (res.ok) {
        const el = document.getElementById(`item-${id}`);
        if (el) el.remove();
        showToast('已删除', 'success');
      }
    } catch { showToast('删除失败', 'error'); }
  }

  // ---- Toast ----
  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.classList.remove('show'); }, 3000);
  }

  // ---- Helpers ----
  function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function formatTime(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return '刚刚';
    if (diff < 3600) return `${Math.floor(diff/60)} 分钟前`;
    if (diff < 86400) return `${Math.floor(diff/3600)} 小时前`;
    return `${d.getMonth()+1}月${d.getDate()}日`;
  }
</script>
