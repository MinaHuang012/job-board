<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 — 求职信息广场</title>
  <style>
    :root {
      --primary: #07C160;
      --primary-dark: #06ad56;
      --danger: #ff4757;
      --bg: #f5f6fa;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --muted: #888;
      --border: #e8eaed;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== LOGIN SCREEN ===== */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      text-align: center;
    }
    .login-icon {
      width: 60px;
      height: 60px;
      background: var(--primary);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 20px;
    }
    .login-card h2 {
      font-size: 22px;
      margin-bottom: 6px;
    }
    .login-card p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }
    .login-input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      transition: border 0.2s;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 16px;
    }
    .login-input:focus { border-color: var(--primary); }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: var(--primary-dark); }
    .login-error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    /* ===== ADMIN SCREEN ===== */
    #adminScreen { display: none; }

    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    .header-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .header-title {
      font-size: 17px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logout-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--muted);
    }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ===== FORM CARD ===== */
    .form-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .form-card h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
      font-family: inherit;
      color: var(--text);
      background: #fff;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--primary);
    }
    .form-textarea {
      resize: vertical;
      min-height: 140px;
      line-height: 1.7;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 520px) {
      .form-row { grid-template-columns: 1fr; }
    }

    /* ===== TAG SELECTOR ===== */
    .tag-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag-option {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      color: var(--muted);
    }
    .tag-option.selected {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      font-weight: 600;
    }
    .tag-option:hover:not(.selected) {
      border-color: var(--primary);
      color: var(--primary);
    }
    .custom-tag-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .custom-tag-input {
      flex: 1;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      outline: none;
    }
    .custom-tag-input:focus { border-color: var(--primary); }
    .add-tag-btn {
      padding: 8px 16px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .add-tag-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* ===== SUBMIT BUTTON ===== */
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .submit-btn:hover { background: var(--primary-dark); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled {
      background: var(--border);
      cursor: not-allowed;
      color: var(--muted);
    }

    /* ===== STATUS TOAST ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #333;
      color: #fff;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.3s ease;
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--primary); }
    .toast.error { background: var(--danger); }

    /* ===== RECENT POSTS ===== */
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .refresh-btn {
      font-size: 13px;
      color: var(--primary);
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    .post-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .post-item {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .post-item-info { flex: 1; min-width: 0; }
    .post-item-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .post-item-meta {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .post-item-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .mini-tag {
      background: #e8f8ef;
      color: var(--primary);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 8px;
    }
    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 6px;
      flex-shrink: 0;
      transition: color 0.2s;
    }
    .delete-btn:hover { color: var(--danger); }

    .empty-list {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <h2>管理员登录</h2>
    <p>请输入管理密码以发布求职信息</p>
    <input
      type="password"
      class="login-input"
      id="passwordInput"
      placeholder="输入密码"
      onkeydown="if(event.key==='Enter') doLogin()"
    />
    <button class="login-btn" onclick="doLogin()">登录</button>
    <div class="login-error" id="loginError">密码错误，请重试</div>
  </div>
</div>

<!-- Admin Screen -->
<div id="adminScreen">
  <header>
    <div class="header-inner">
      <div class="header-title">💼 管理后台</div>
      <button class="logout-btn" onclick="doLogout()">退出登录</button>
    </div>
  </header>

  <div class="container">

    <!-- Publish Form -->
    <div class="form-card">
      <h3>✏️ 发布新信息</h3>

      <div class="form-group">
        <label class="form-label">信息标题（必填）</label>
        <input class="form-input" id="jobTitle" placeholder="例：前端工程师 · 字节跳动 · 30K-50K" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">公司名称</label>
          <input class="form-input" id="jobCompany" placeholder="例：字节跳动" />
        </div>
        <div class="form-group">
          <label class="form-label">工作地点</label>
          <input class="form-input" id="jobLocation" placeholder="例：北京 / 远程" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">薪资范围</label>
        <input class="form-input" id="jobSalary" placeholder="例：20K-35K · 15薪" />
      </div>

      <div class="form-group">
        <label class="form-label">详细内容（从微信群复制粘贴到这里）</label>
        <textarea class="form-textarea" id="jobContent" placeholder="直接粘贴群里的原文消息..."></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">选择标签（可多选）</label>
        <div class="tag-selector" id="tagSelector">
          <span class="tag-option" data-tag="全职" onclick="toggleTag(this)">全职</span>
          <span class="tag-option" data-tag="兼职" onclick="toggleTag(this)">兼职</span>
          <span class="tag-option" data-tag="实习" onclick="toggleTag(this)">实习</span>
          <span class="tag-option" data-tag="远程" onclick="toggleTag(this)">远程</span>
          <span class="tag-option" data-tag="技术" onclick="toggleTag(this)">技术</span>
          <span class="tag-option" data-tag="设计" onclick="toggleTag(this)">设计</span>
          <span class="tag-option" data-tag="产品" onclick="toggleTag(this)">产品</span>
          <span class="tag-option" data-tag="运营" onclick="toggleTag(this)">运营</span>
          <span class="tag-option" data-tag="市场" onclick="toggleTag(this)">市场</span>
          <span class="tag-option" data-tag="销售" onclick="toggleTag(this)">销售</span>
          <span class="tag-option" data-tag="应届生" onclick="toggleTag(this)">应届生</span>
        </div>
        <div class="custom-tag-row">
          <input class="custom-tag-input" id="customTagInput" placeholder="自定义标签..." onkeydown="if(event.key==='Enter') addCustomTag()" />
          <button class="add-tag-btn" onclick="addCustomTag()">+ 添加</button>
        </div>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="submitJob()">🚀 立即发布</button>
    </div>

    <!-- Recent Posts -->
    <div>
      <div class="section-title">
        📋 最近发布
        <button class="refresh-btn" onclick="loadRecentPosts()">刷新</button>
      </div>
      <div class="post-list" id="postList">
        <div class="empty-list">加载中...</div>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ============================================================
  // CONFIG — 部署后替换为你的信息
  // ============================================================
  const SUPABASE_URL = 'https://qebvxqxonoudtkjclyxv.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlYnZ4cXhvbm91ZHRramNseXh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTgwNjAsImV4cCI6MjA4OTU3NDA2MH0.HLAE_56UQBoWEmUghQKK_rTigExQvQwGWZ0dhzGXUM4';
  const TABLE_NAME = 'jobs';
  const ADMIN_PASSWORD = 'job123456'; // 设置你的管理密码
  // ============================================================

  // ---- Login ----
  function doLogin() {
    const pwd = document.getElementById('passwordInput').value;
    if (pwd === ADMIN_PASSWORD) {
      sessionStorage.setItem('admin_auth', '1');
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      loadRecentPosts();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }
  }

  function doLogout() {
    sessionStorage.removeItem('admin_auth');
    location.reload();
  }

  // Auto-restore session
  if (sessionStorage.getItem('admin_auth') === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    document.addEventListener('DOMContentLoaded', loadRecentPosts);
  }

  // ---- Tag toggle ----
  function toggleTag(el) {
    el.classList.toggle('selected');
  }

  function addCustomTag() {
    const input = document.getElementById('customTagInput');
    const val = input.value.trim();
    if (!val) return;
    const selector = document.getElementById('tagSelector');
    // Check duplicate
    const existing = [...selector.querySelectorAll('.tag-option')].find(t => t.dataset.tag === val);
    if (existing) {
      existing.classList.add('selected');
    } else {
      const span = document.createElement('span');
      span.className = 'tag-option selected';
      span.dataset.tag = val;
      span.textContent = val;
      span.onclick = function() { toggleTag(this); };
      selector.appendChild(span);
    }
    input.value = '';
  }

  function getSelectedTags() {
    return [...document.querySelectorAll('.tag-option.selected')].map(t => t.dataset.tag);
  }

  // ---- Submit ----
  async function submitJob() {
    const title = document.getElementById('jobTitle').value.trim();
    const content = document.getElementById('jobContent').value.trim();
    if (!title) { showToast('请填写标题', 'error'); return; }
    if (!content) { showToast('请填写详细内容', 'error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '发布中...';

    const payload = {
      title,
      content,
      company: document.getElementById('jobCompany').value.trim() || null,
      location: document.getElementById('jobLocation').value.trim() || null,
      salary: document.getElementById('jobSalary').value.trim() || null,
      tags: getSelectedTags(),
    };

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(await res.text());
      showToast('发布成功！✅', 'success');
      clearForm();
      loadRecentPosts();
    } catch (e) {
      showToast('发布失败，请检查配置', 'error');
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.textContent = '🚀 立即发布';
    }
  }

  function clearForm() {
    ['jobTitle','jobCompany','jobLocation','jobSalary','jobContent'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.querySelectorAll('.tag-option.selected').forEach(t => t.classList.remove('selected'));
  }

  // ---- Load recent posts ----
  async function loadRecentPosts() {
    const list = document.getElementById('postList');
    list.innerHTML = '<div class="empty-list">加载中...</div>';
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/${TABLE_NAME}?select=*&order=created_at.desc&limit=20`,
        {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          }
        }
      );
      const jobs = await res.json();
      if (!jobs.length) {
        list.innerHTML = '<div class="empty-list">暂无发布记录</div>';
        return;
      }
      list.innerHTML = jobs.map(job => `
        <div class="post-item" id="item-${job.id}">
          <div class="post-item-info">
            <div class="post-item-title">${escHtml(job.title || '无标题')}</div>
            <div class="post-item-meta">
              ${job.company ? `<span>🏢 ${escHtml(job.company)}</span>` : ''}
              ${job.location ? `<span>📍 ${escHtml(job.location)}</span>` : ''}
              <span>🕐 ${formatTime(job.created_at)}</span>
            </div>
            <div class="post-item-tags">
              ${(job.tags||[]).map(t => `<span class="mini-tag">${t}</span>`).join('')}
            </div>
          </div>
          <button class="delete-btn" onclick="deleteJob('${job.id}')" title="删除">🗑</button>
        </div>
      `).join('');
    } catch(e) {
      list.innerHTML = '<div class="empty-list">加载失败</div>';
    }
  }

  // ---- Delete ----
  async function deleteJob(id) {
    if (!confirm('确定要删除这条信息吗？')) return;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?id=eq.${id}`, {
        method: 'DELETE',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        }
      });
      if (!res.ok) throw new Error();
      const el = document.getElementById(`item-${id}`);
      if (el) el.remove();
      showToast('已删除', 'success');
    } catch {
      showToast('删除失败', 'error');
    }
  }

  // ---- Toast ----
  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.classList.remove('show'); }, 3000);
  }

  // ---- Helpers ----
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function formatTime(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return '刚刚';
    if (diff < 3600) return `${Math.floor(diff/60)} 分钟前`;
    if (diff < 86400) return `${Math.floor(diff/3600)} 小时前`;
    return `${d.getMonth()+1}月${d.getDate()}日`;
  }
</script>
</body>
</html>
